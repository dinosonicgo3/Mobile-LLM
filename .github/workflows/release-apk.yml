name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag，可留空；留空會自動使用 app/build.gradle.kts 的 versionName，例如 v1.4.4'
        required: false
        default: ''
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**/*.md'
      - 'README.md'

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish signed release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: version
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            VERSION_NAME=$(grep -o 'versionName = "[^"]*"' app/build.gradle.kts | head -n 1 | sed 's/versionName = "//;s/"//')
            TAG="v${VERSION_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Verify stable signing key exists
        run: |
          ls -la app/oracleairescue-update-key.jks
          test -f app/oracleairescue-update-key.jks

      - name: Build signed release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Rename release APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk "release/OracleCloudAI-${{ steps.version.outputs.tag }}-release.apk"
          ls -la release

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: 甲骨文雲端AI ${{ steps.version.outputs.tag }}
          body: |
            這是正式 Release APK，不是 Debug APK。

            這個 Release 由 GitHub Actions 自動建立或更新。

            用途：
            - 給手機穩定安裝/更新
            - 給 App 的「查看 Releases / 下載 APK」讀取
            - 若新版壞掉，可回到 Releases 下載舊版 APK 回滾

            注意：
            - 此 APK 使用專案內固定簽章 app/oracleairescue-update-key.jks。
            - 從固定簽章版之後，後續版本可直接覆蓋安裝並保留 App 資料。
          files: release/*.apk
          make_latest: true
          overwrite_files: true
