name: Start Kaggle Qwen API

on:
  workflow_dispatch:
    inputs:
      idle_minutes:
        description: '閒置幾分鐘後自動關閉 Kaggle GPU'
        required: true
        default: '10'
      weekly_quota_hours:
        description: '每週 GPU 額度小時，僅供估算'
        required: true
        default: '30'
      model_name:
        description: 'Kaggle / llama.cpp 對外顯示的模型名稱'
        required: false
        default: 'qwen36-27b-q4-gguf'
      dataset_slug:
        description: 'Kaggle GGUF 模型 dataset slug'
        required: true
        default: 'dinosonicgo/qwen36-27b-q4-gguf-cache'
      tools_dataset_slug:
        description: 'Kaggle tunnel / llama.cpp 工具 dataset slug，可留空'
        required: false
        default: 'dinosonicgo/qwen36-tunnel-tools'
      model_source:
        description: 'Kaggle Model source，可留空；格式 username/model/framework/variation/version'
        required: false
        default: ''

permissions:
  contents: read

env:
  KAGGLE_USERNAME: dinosonicgo
  KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
  KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

jobs:
  start:
    name: Push and start Kaggle Qwen kernel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: |
          python -m pip install --upgrade pip
          pip install kaggle

      - name: Prepare Kaggle API credential
        run: |
          mkdir -p ~/.kaggle
          python - <<'PY'
          import json, os, pathlib
          token = os.environ.get('KAGGLE_API_TOKEN', '').strip()
          old_key = os.environ.get('KAGGLE_KEY', '').strip()
          user = os.environ.get('KAGGLE_USERNAME', 'dinosonicgo').strip()
          kaggle_dir = pathlib.Path.home().joinpath('.kaggle')
          if token:
              # Kaggle 新版 API Token：寫入 ~/.kaggle/access_token
              kaggle_dir.joinpath('access_token').write_text(token, encoding='utf-8')
          elif old_key:
              # 舊版 kaggle.json 相容模式
              kaggle_dir.joinpath('kaggle.json').write_text(json.dumps({'username': user, 'key': old_key}), encoding='utf-8')
          else:
              raise SystemExit('Missing GitHub secret KAGGLE_API_TOKEN')
          PY
          chmod 600 ~/.kaggle/access_token 2>/dev/null || true
          chmod 600 ~/.kaggle/kaggle.json 2>/dev/null || true

      - name: Generate Kaggle kernel package
        env:
          GH_CONFIG_PAT: ${{ secrets.GH_CONFIG_PAT }}
          GH_OWNER: dinosonicgo3
          GH_REPO: Mobile-LLM
          GH_BRANCH: main
          CONFIG_PATH: oracle-ai-rescue-config.json
          IDLE_MINUTES: ${{ github.event.inputs.idle_minutes }}
          WEEKLY_QUOTA_HOURS: ${{ github.event.inputs.weekly_quota_hours }}
          MODEL_NAME: ${{ github.event.inputs.model_name }}
          DATASET_SLUG: ${{ github.event.inputs.dataset_slug }}
          TOOLS_DATASET_SLUG: ${{ github.event.inputs.tools_dataset_slug }}
          MODEL_SOURCE: ${{ github.event.inputs.model_source }}
        run: |
          if [ -z "$GH_CONFIG_PAT" ]; then
            echo "Missing GitHub secret GH_CONFIG_PAT. It needs Contents: Read and write on this repo."
            exit 1
          fi
          rm -rf kaggle_runtime
          mkdir -p kaggle_runtime
          cp kaggle_qwen_kernel/kaggle_qwen_server.py kaggle_runtime/kaggle_qwen_server.py
          python - <<'PY'
          import json, os, pathlib
          p = pathlib.Path('kaggle_runtime/kaggle_qwen_server.py')
          s = p.read_text(encoding='utf-8')
          repl = {
              '__GH_TOKEN__': os.environ['GH_CONFIG_PAT'],
              '__GH_OWNER__': os.environ['GH_OWNER'],
              '__GH_REPO__': os.environ['GH_REPO'],
              '__GH_BRANCH__': os.environ['GH_BRANCH'],
              '__CONFIG_PATH__': os.environ['CONFIG_PATH'],
              '__IDLE_MINUTES__': os.environ['IDLE_MINUTES'],
              '__WEEKLY_QUOTA_HOURS__': os.environ['WEEKLY_QUOTA_HOURS'],
              '__MODEL_NAME__': os.environ['MODEL_NAME'] or 'qwen36-27b-q4-gguf',
              '__MODEL_SOURCE__': os.environ.get('MODEL_SOURCE', '') or '',
          }
          for k, v in repl.items():
              s = s.replace(k, v.replace('\\', '\\\\').replace('"', '\\"'))
          p.write_text(s, encoding='utf-8')
          dataset_sources = []
          for slug in [os.environ.get('DATASET_SLUG', ''), os.environ.get('TOOLS_DATASET_SLUG', '')]:
              slug = (slug or '').strip()
              if slug and slug not in dataset_sources:
                  dataset_sources.append(slug)
          model_sources = []
          model_source = (os.environ.get('MODEL_SOURCE', '') or '').strip()
          if model_source:
              model_sources.append(model_source)
          meta = {
              'id': f"{os.environ['KAGGLE_USERNAME']}/mobile-llm-kaggle-qwen",
              'title': 'mobile-llm-kaggle-qwen',
              'code_file': 'kaggle_qwen_server.py',
              'language': 'python',
              'kernel_type': 'script',
              'is_private': True,
              'enable_gpu': True,
              'enable_internet': True,
              'dataset_sources': dataset_sources,
              'competition_sources': [],
              'kernel_sources': [],
              'model_sources': model_sources
          }
          pathlib.Path('kaggle_runtime/kernel-metadata.json').write_text(json.dumps(meta, ensure_ascii=False, indent=2), encoding='utf-8')
          PY



      - name: Preflight GH_CONFIG_PAT can write config
        env:
          GH_CONFIG_PAT: ${{ secrets.GH_CONFIG_PAT }}
          GH_OWNER: dinosonicgo3
          GH_REPO: Mobile-LLM
          GH_BRANCH: main
          CONFIG_PATH: oracle-ai-rescue-config.json
        run: |
          python - <<'PY'
          import base64, json, os, urllib.request, urllib.error, datetime
          token = os.environ.get('GH_CONFIG_PAT', '').strip()
          if not token:
              raise SystemExit('Missing GH_CONFIG_PAT. It must be a GitHub token with Contents: Read and write for this repo.')
          owner=os.environ['GH_OWNER']; repo=os.environ['GH_REPO']; branch=os.environ['GH_BRANCH']; path=os.environ['CONFIG_PATH']
          api = f'https://api.github.com/repos/{owner}/{repo}/contents/{path}'
          def req(method, url, data=None):
              body = None if data is None else json.dumps(data).encode('utf-8')
              r = urllib.request.Request(url, data=body, method=method)
              r.add_header('Authorization', 'Bearer ' + token)
              r.add_header('Accept', 'application/vnd.github+json')
              r.add_header('X-GitHub-Api-Version', '2022-11-28')
              if body is not None:
                  r.add_header('Content-Type', 'application/json')
              try:
                  with urllib.request.urlopen(r, timeout=30) as resp:
                      raw = resp.read().decode('utf-8')
                      return json.loads(raw) if raw else {}
              except urllib.error.HTTPError as e:
                  detail = e.read().decode('utf-8', 'ignore')
                  raise SystemExit(f'GH_CONFIG_PAT preflight failed: HTTP {e.code}\n{detail}\n\n請到 GitHub repo → Settings → Secrets and variables → Actions，確認 GH_CONFIG_PAT 是 Fine-grained PAT，且對 dinosonicgo3/Mobile-LLM 有 Contents: Read and write。')
          current = req('GET', api + '?ref=' + branch)
          raw = base64.b64decode(current.get('content','')).decode('utf-8')
          cfg = json.loads(raw) if raw.strip() else {}
          kaggle = cfg.setdefault('kaggle', {})
          kaggle['lastPreflightUtc'] = datetime.datetime.utcnow().isoformat(timespec='seconds') + 'Z'
          cfg['kaggle'] = kaggle
          payload = {
              'message': 'Preflight Kaggle endpoint writer permission',
              'content': base64.b64encode(json.dumps(cfg, ensure_ascii=False, indent=2).encode('utf-8')).decode('ascii'),
              'branch': branch,
              'sha': current.get('sha')
          }
          req('PUT', api, payload)
          print('GH_CONFIG_PAT preflight OK: config file is writable.')
          PY

      - name: Push Kaggle kernel
        env:
          KAGGLE_KERNEL_OWNER: dinosonicgo
          GITHUB_RUN_ID_FOR_SLUG: ${{ github.run_id }}
        run: |
          # GGUF 由 llama.cpp 啟動；T4 可用但 27B Q4 可能會視顯存自動降低 GPU offload。
          # v2.4.8：修正 Kaggle 409 Conflict。原因通常是 kernel title 產生的 slug 與 id 不一致，
          # 或舊 kernel 正在執行造成同一個 slug 不能被覆寫。
          # 第一輪用固定 slug；若仍 409，第二輪改用本次 GitHub run 專屬 slug，避免衝突。
          echo "=== Kaggle metadata before push ==="
          cat kaggle_runtime/kernel-metadata.json
          echo "=== Push stable Kaggle kernel slug ==="
          set +e
          kaggle kernels push -p kaggle_runtime --accelerator NvidiaTeslaT4 --timeout 43200
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            echo "Stable push failed. Retrying dataset-only with the same exact title/id slug."
            python - <<'PY'
          import json, pathlib
          p = pathlib.Path('kaggle_runtime/kernel-metadata.json')
          meta = json.loads(p.read_text(encoding='utf-8'))
          meta['model_sources'] = []
          # The Kaggle title must resolve to the same slug as metadata id.
          meta['id'] = 'dinosonicgo/mobile-llm-kaggle-qwen'
          meta['title'] = 'mobile-llm-kaggle-qwen'
          p.write_text(json.dumps(meta, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
            echo "=== Kaggle metadata before dataset-only retry ==="
            cat kaggle_runtime/kernel-metadata.json
            set +e
            kaggle kernels push -p kaggle_runtime --accelerator NvidiaTeslaT4 --timeout 43200
            rc=$?
            set -e
          fi
          if [ $rc -ne 0 ]; then
            echo "Dataset-only stable push still failed. Retrying with a unique per-run kernel slug to avoid Kaggle 409 conflict."
            python - <<'PY'
          import json, os, pathlib, re
          p = pathlib.Path('kaggle_runtime/kernel-metadata.json')
          meta = json.loads(p.read_text(encoding='utf-8'))
          owner = os.environ.get('KAGGLE_KERNEL_OWNER', 'dinosonicgo')
          run_id = os.environ.get('GITHUB_RUN_ID_FOR_SLUG') or os.environ.get('GITHUB_RUN_ID') or 'manual'
          run_id = re.sub(r'[^a-zA-Z0-9-]+', '-', run_id).strip('-').lower() or 'manual'
          slug = f'mobile-llm-kaggle-qwen-{run_id}'
          meta['id'] = f'{owner}/{slug}'
          meta['title'] = slug
          meta['model_sources'] = []
          p.write_text(json.dumps(meta, ensure_ascii=False, indent=2), encoding='utf-8')
          print(f'Using unique Kaggle kernel id: {owner}/{slug}')
          PY
            echo "=== Kaggle metadata before unique-slug retry ==="
            cat kaggle_runtime/kernel-metadata.json
            kaggle kernels push -p kaggle_runtime --accelerator NvidiaTeslaT4 --timeout 43200
          fi
